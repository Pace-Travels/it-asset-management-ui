<app-page-header title="Edit Asset Information Status" subtitle="Edit Asset Information Status" [showButton]="false" [showBackButton]="true"
    (backClick)="goBack()">
</app-page-header>

<div class="card">

    <form [formGroup]="assetInfoStatusForm">
        <div class="form-grid-2">
            <div class="form-group">

                <label>Aseet Info Status Name<span class="required">*</span></label>

                <input type="text" formControlName="name">
                <app-validation-message [control]="assetInfoStatusForm.controls['name']"
                    label="Asset Name"></app-validation-message>
            </div>
        </div>
        <div class="form-grid-1">
            <div class="form-group">

                <label>Aseet Info Status Description</label>

                <textarea formControlName="description"></textarea>
            </div>
        </div>

        <div class="form-actions">

            <button type="button" class="secondary-btn" (click)="goBack()">

                Cancel

            </button>

            <button type="submit" class="primary-btn" [disabled]="assetInfoStatusForm.invalid" (click)="save()">

                Update Asset Info Status

            </button>

        </div>

    </form>

</div>
